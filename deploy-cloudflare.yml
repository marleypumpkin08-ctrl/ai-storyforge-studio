# Deploy full Next.js app (OpenNext) to Cloudflare Workers.
# Runs on Linux so Prisma/OpenNext symlink step succeeds (Windows EPERM workaround).
name: Deploy to Cloudflare

on:
  workflow_dispatch:
  push:
    branches: [main, master]

concurrency:
  group: cloudflare-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Build & deploy (OpenNext + Wrangler)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          # Optional: helps some Wrangler versions resolve account
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          DATABASE_URL: "file:./prisma/ci.db"
        run: npm run deploy
